# Application
app:
  name: bootcamp-app
  environment: development
  logLevel: INFO
  maxConnections: "100"

# Docker image
image:
  repository: harri05/devops-bootcamp
  tag: latest
  pullPolicy: Always

# Replicas
replicaCount: 3

# Service
service:
  type: NodePort
  port: 80
  targetPort: 5000
  nodePort: 30080

# Resources
resources:
  requests:
    memory: "128Mi"
    cpu: "100m"
  limits:
    memory: "256Mi"
    cpu: "300m"

# Redis
redis:
  host: redis
  port: "6379"
  image: redis:7.2-alpine
  resources:
    requests:
      memory: "64Mi"
      cpu: "100m"
    limits:
      memory: "128Mi"
      cpu: "200m"

# Namespace
namespace: dev
